<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Berita & Artikel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📰 Upload Berita</h1>
            <p>Bagikan berita terbaru dengan gambar menarik</p>
        </header>

        <main class="upload-section">
            <div class="upload-card">
                <form id="newsForm" class="upload-form">
                    <div class="form-group">
                        <label for="title">Judul Berita</label>
                        <input type="text" id="title" placeholder="Masukkan judul berita..." required>
                    </div>

                    <div class="form-group">
                        <label for="image">Gambar Berita</label>
                        <div class="image-upload">
                            <input type="file" id="image" accept="image/*" required>
                            <label for="image" class="image-label">
                                <span class="image-icon">📷</span>
                                <span>Pilih Gambar</span>
                            </label>
                            <div id="imagePreview" class="image-preview"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="content">Isi Artikel</label>
                        <textarea id="content" rows="10" placeholder="Tulis isi berita lengkap..." required></textarea>
                    </div>

                    <button type="submit" class="upload-btn">
                        <span>🚀 Upload Berita</span>
                    </button>
                </form>
            </div>
        </main>

        <section class="news-list">
            <h2>Berita Terupload</h2>
            <div id="newsContainer" class="news-grid"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
